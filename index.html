<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Qwen 2.5 7B — local chat</title>
<style>
  :root{
    --bg:#0f1117; --panel:#171a23; --edge:#262b38; --ink:#e7ebf3; --dim:#93a0b8;
    --me:#20304d; --accent:#7aa2ff; --accent2:#5effc4; --code:#0b0e15;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg); color:var(--ink); font-family:var(--sans);
    display:flex; flex-direction:column; height:100vh}
  header{display:flex; align-items:center; gap:12px; padding:12px 18px;
    border-bottom:1px solid var(--edge); background:var(--panel)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--accent2);
    box-shadow:0 0 10px var(--accent2)}
  header h1{font-size:15px; margin:0; font-weight:600}
  header .meta{color:var(--dim); font-size:12px}
  header .spacer{flex:1}
  header button{background:transparent; color:var(--dim); border:1px solid var(--edge);
    border-radius:8px; padding:6px 12px; font-size:12px; cursor:pointer; font-family:var(--sans)}
  header button:hover{color:var(--ink); border-color:var(--accent)}

  #feed{flex:1; overflow-y:auto; padding:24px 0}
  .msg{max-width:760px; margin:0 auto 20px; padding:0 20px; display:flex; gap:12px}
  .avatar{width:28px;height:28px;border-radius:7px;flex:none;font-size:13px;
    display:flex;align-items:center;justify-content:center;font-weight:700}
  .user .avatar{background:var(--me); color:var(--accent)}
  .bot .avatar{background:#10261e; color:var(--accent2)}
  .bubble{padding-top:3px; line-height:1.6; font-size:15px; overflow-wrap:anywhere}
  .role{font-size:12px; color:var(--dim); margin-bottom:3px}
  .bubble p{margin:0 0 10px}
  .bubble pre{background:var(--code); border:1px solid var(--edge); border-radius:10px;
    padding:12px 14px; overflow-x:auto; font-family:var(--mono); font-size:13px; margin:8px 0}
  .bubble code{font-family:var(--mono); font-size:13px; background:#0b0e15;
    padding:1px 5px; border-radius:5px}
  .bubble pre code{background:none; padding:0}
  .cursor{display:inline-block;width:8px;height:15px;background:var(--accent2);
    vertical-align:-2px;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .stat{max-width:760px;margin:-10px auto 20px;padding:0 20px 0 52px;
    color:var(--dim);font-size:11px;font-family:var(--mono)}

  footer{border-top:1px solid var(--edge); background:var(--panel); padding:12px}
  .composer{max-width:760px; margin:0 auto; display:flex; gap:10px; align-items:flex-end}
  textarea{flex:1; resize:none; background:var(--bg); color:var(--ink);
    border:1px solid var(--edge); border-radius:12px; padding:12px 14px;
    font-family:var(--sans); font-size:15px; line-height:1.4; max-height:180px; outline:none}
  textarea:focus{border-color:var(--accent)}
  .send{background:var(--accent); color:#08122a; border:none; border-radius:12px;
    width:44px; height:44px; font-size:18px; cursor:pointer; flex:none}
  .send:disabled{opacity:.4; cursor:not-allowed}
  .hint{max-width:760px;margin:6px auto 0;color:var(--dim);font-size:11px;text-align:center}
  .empty{max-width:520px;margin:14vh auto;text-align:center;color:var(--dim)}
  .empty h2{color:var(--ink);font-weight:600;font-size:20px;margin:0 0 8px}
  .examples{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:18px}
  .ex{background:var(--panel);border:1px solid var(--edge);color:var(--dim);
    padding:8px 13px;border-radius:10px;font-size:13px;cursor:pointer}
  .ex:hover{color:var(--ink);border-color:var(--accent)}
</style>
</head>
<body>
<header>
  <span class="dot"></span>
  <h1>Qwen 2.5 7B</h1>
  <span class="meta">local · Apple M1 · 4-bit · via Ollama</span>
  <span class="spacer"></span>
  <button id="clear">New chat</button>
</header>

<div id="feed">
  <div class="empty" id="empty">
    <h2>Chatting with a 7-billion-parameter model on your laptop</h2>
    <div>No cloud, no API key — every token is generated on your M1's GPU.</div>
    <div class="examples" id="examples"></div>
  </div>
</div>

<footer>
  <div class="composer">
    <textarea id="input" rows="1" placeholder="Message Qwen…  (Enter to send, Shift+Enter for newline)"></textarea>
    <button class="send" id="send" title="Send">↑</button>
  </div>
  <div class="hint">Runs entirely offline. First reply is slower while the model loads into memory.</div>
</footer>

<script>
const $ = s => document.querySelector(s);
const feed = $("#feed"), input = $("#input"), send = $("#send");
const messages = [];   // full conversation history sent to the model each turn

const EXAMPLES = [
  "Explain quantum entanglement to a 10-year-old",
  "Write a haiku about the second law of thermodynamics",
  "Give me a Python function to check if a number is prime",
  "Why is the sky blue? Keep it short.",
];
const exWrap = $("#examples");
EXAMPLES.forEach(t => {
  const b = document.createElement("div");
  b.className = "ex"; b.textContent = t;
  b.onclick = () => { input.value = t; sendMsg(); };
  exWrap.appendChild(b);
});

input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 180) + "px";
});
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
send.onclick = sendMsg;
$("#clear").onclick = () => {
  messages.length = 0;
  feed.querySelectorAll(".msg,.stat").forEach(n => n.remove());
  $("#empty")?.style.removeProperty("display");
};

function addMsg(role, initial=""){
  $("#empty") && ($("#empty").style.display = "none");
  const wrap = document.createElement("div");
  wrap.className = "msg " + (role === "user" ? "user" : "bot");
  wrap.innerHTML = `<div class="avatar">${role === "user" ? "You" : "Q"}</div>
    <div style="flex:1"><div class="role">${role === "user" ? "You" : "Qwen 2.5 7B"}</div>
    <div class="bubble"></div></div>`;
  feed.appendChild(wrap);
  const bubble = wrap.querySelector(".bubble");
  bubble.innerHTML = render(initial);
  feed.scrollTop = feed.scrollHeight;
  return bubble;
}

async function sendMsg(){
  const text = input.value.trim();
  if (!text || send.disabled) return;
  input.value = ""; input.style.height = "auto";
  send.disabled = true;

  messages.push({ role: "user", content: text });
  addMsg("user", text);

  const bubble = addMsg("assistant");
  bubble.innerHTML = '<span class="cursor"></span>';
  let full = "";

  try {
    const res = await fetch("/chat", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages })
    });
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = "", stats = null;
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let nl;
      while ((nl = buf.indexOf("\n")) >= 0) {
        const line = buf.slice(0, nl).trim(); buf = buf.slice(nl + 1);
        if (!line) continue;
        const obj = JSON.parse(line);
        if (obj.message?.content) {
          full += obj.message.content;
          bubble.innerHTML = render(full) + '<span class="cursor"></span>';
          feed.scrollTop = feed.scrollHeight;
        }
        if (obj.done) stats = obj;
      }
    }
    bubble.innerHTML = render(full);
    messages.push({ role: "assistant", content: full });
    if (stats && stats.eval_count) showStat(bubble, stats);
  } catch (e) {
    bubble.innerHTML = render("⚠ Couldn't reach the model.\n\n" + e +
      "\n\nIs the server running? (python3 chat_server.py) Is Ollama up?");
  } finally {
    send.disabled = false;
    input.focus();
  }
}

function showStat(bubble, s){
  const tps = s.eval_count / (s.eval_duration / 1e9);
  const stat = document.createElement("div");
  stat.className = "stat";
  stat.textContent = `${s.eval_count} tokens · ${tps.toFixed(1)} tok/s on your M1`;
  bubble.closest(".msg").after(stat);
}

// tiny, safe markdown: escape first, then code fences, inline code, bold, paragraphs
function render(t){
  let h = t.replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]));
  h = h.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, l, c) => `<pre><code>${c.replace(/\n$/,"")}</code></pre>`);
  h = h.replace(/`([^`]+)`/g, "<code>$1</code>");
  h = h.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  h = h.split(/\n{2,}/).map(p =>
    p.includes("<pre>") ? p : "<p>" + p.replace(/\n/g, "<br>") + "</p>").join("");
  return h;
}
</script>
</body>
</html>
