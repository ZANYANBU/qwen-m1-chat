<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Qwen — local AI chat</title>
<style>
  :root{
    --bg0:#04050c; --bg1:#0a0c18;
    --panel:rgba(16,19,38,.72); --panel2:rgba(24,28,52,.55);
    --edge:rgba(255,255,255,.09); --edge2:rgba(255,255,255,.16);
    --ink:#eef1fb; --dim:#95a1c4; --faint:#5f6a8a;
    --accent:#8b7bff; --accent2:#4fd8ff; --glow:rgba(139,123,255,.5);
    --user1:#5b4bd6; --user2:#7a5cff; --rec:#ff5a7a;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,sans-serif;
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
    --sb:280px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:var(--sans);color:var(--ink);
    background:
      radial-gradient(1000px 600px at 12% -10%, rgba(123,92,255,.22), transparent 60%),
      radial-gradient(900px 700px at 110% 10%, rgba(79,216,255,.14), transparent 55%),
      radial-gradient(700px 700px at 50% 120%, rgba(139,123,255,.12), transparent 60%),
      linear-gradient(180deg,var(--bg1),var(--bg0));}
  #stars{position:fixed;inset:0;z-index:0;pointer-events:none}
  .app{position:relative;z-index:1;display:flex;height:100vh}

  .sidebar{width:var(--sb);flex:none;display:flex;flex-direction:column;
    background:var(--panel);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border-right:1px solid var(--edge);transition:margin-left .25s ease}
  .sb-top{padding:14px 12px 10px}
  .brand{display:flex;align-items:center;gap:9px;padding:4px 6px 12px}
  .brand .orb{width:24px;height:24px;border-radius:50%;
    background:radial-gradient(circle at 32% 30%,#cbb8ff,var(--accent) 55%,#3b2b8a);box-shadow:0 0 14px var(--glow)}
  .brand b{font-size:15px;font-weight:600}.brand span{font-size:11px;color:var(--dim)}
  .newchat{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
    background:linear-gradient(135deg,var(--user1),var(--user2));color:#fff;border:none;
    padding:11px;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;
    font-family:var(--sans);box-shadow:0 4px 18px rgba(123,92,255,.35)}
  .newchat:hover{filter:brightness(1.08)}
  .sb-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:2px}
  .sb-cat{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.6px;padding:10px 10px 5px}
  .chatitem{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;
    color:var(--dim);font-size:13.5px}
  .chatitem:hover,.chatitem.active{background:var(--panel2);color:var(--ink)}
  .chatitem .tt{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chatitem .del{opacity:0;border:none;background:none;color:var(--faint);cursor:pointer;font-size:15px;padding:2px 4px;border-radius:6px}
  .chatitem:hover .del{opacity:1}.chatitem .del:hover{color:#ff7a8a;background:rgba(255,122,138,.12)}
  .sb-foot{padding:12px 16px;border-top:1px solid var(--edge);font-size:11px;color:var(--faint);display:flex;align-items:center;gap:8px}
  .sb-foot .dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);box-shadow:0 0 8px var(--accent2);flex:none}

  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--edge);
    background:rgba(10,12,24,.35);backdrop-filter:blur(10px)}
  .hamb{display:none;background:none;border:none;color:var(--ink);font-size:20px;cursor:pointer}
  .topbar .ttl{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .topbar .badge{font-size:11px;color:var(--dim);border:1px solid var(--edge);padding:3px 9px;border-radius:999px;white-space:nowrap}
  .topbar .spacer{flex:1}
  .toggle{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dim);cursor:pointer;user-select:none}
  .toggle input{accent-color:var(--accent)}
  .modelsel{background:rgba(255,255,255,.04);color:var(--ink);border:1px solid var(--edge);border-radius:999px;
    padding:4px 10px;font-size:12px;font-family:var(--sans);cursor:pointer;outline:none;max-width:190px}
  .modelsel:hover{border-color:var(--edge2)}
  .modelsel option{background:#141830;color:var(--ink)}

  #feed{flex:1;overflow-y:auto;scroll-behavior:smooth}
  .thread{max-width:780px;margin:0 auto;padding:26px 20px 40px}
  .row{display:flex;gap:13px;margin-bottom:22px}
  .row.user{flex-direction:row-reverse}
  .av{width:30px;height:30px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .user .av{background:linear-gradient(135deg,var(--user1),var(--user2));color:#fff}
  .bot .av{background:radial-gradient(circle at 32% 30%,#bff6ff,#2aa7c9 60%,#155);color:#012}
  .body{min-width:0;max-width:calc(100% - 46px)}
  .name{font-size:11.5px;color:var(--dim);margin:3px 0 4px}.user .name{text-align:right}
  .bubble{line-height:1.65;font-size:15.5px;overflow-wrap:anywhere}
  .user .bubble{background:linear-gradient(135deg,var(--user1),var(--user2));color:#fff;padding:11px 15px;
    border-radius:16px 16px 4px 16px;display:inline-block;box-shadow:0 4px 16px rgba(90,70,200,.3)}
  .bot .bubble{color:var(--ink)}
  .bubble p{margin:0 0 11px}.bubble p:last-child{margin-bottom:0}
  .bubble pre{background:#080a14;border:1px solid var(--edge);border-radius:11px;padding:12px 14px;overflow-x:auto;
    font-family:var(--mono);font-size:13px;margin:9px 0;position:relative}
  .bubble code{font-family:var(--mono);font-size:13px;background:rgba(255,255,255,.08);padding:1px 6px;border-radius:6px}
  .bubble pre code{background:none;padding:0}
  .msg-imgs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;justify-content:flex-end}
  .msg-imgs img{max-width:220px;max-height:220px;border-radius:12px;border:1px solid var(--edge2)}
  .copy{position:absolute;top:7px;right:7px;background:rgba(255,255,255,.08);border:1px solid var(--edge);
    color:var(--dim);font-size:11px;padding:3px 8px;border-radius:7px;cursor:pointer;opacity:0;font-family:var(--sans)}
  pre:hover .copy{opacity:1}.copy:hover{color:var(--ink)}
  .cursor{display:inline-block;width:8px;height:16px;background:var(--accent2);vertical-align:-3px;border-radius:2px;
    animation:blink 1s steps(1) infinite;box-shadow:0 0 8px var(--accent2)}
  @keyframes blink{50%{opacity:0}}
  .msgtools{margin-top:6px;display:flex;gap:8px;align-items:center}
  .tbtn{background:none;border:1px solid var(--edge);color:var(--faint);font-size:12px;padding:3px 9px;border-radius:8px;
    cursor:pointer;font-family:var(--sans);display:flex;align-items:center;gap:5px}
  .tbtn:hover{color:var(--ink);border-color:var(--edge2)}
  .tbtn.on{color:var(--accent2);border-color:var(--accent2)}
  .stat{font-size:11px;color:var(--faint);font-family:var(--mono)}

  .welcome{max-width:640px;margin:10vh auto 0;text-align:center;padding:0 20px}
  .welcome .big{width:56px;height:56px;border-radius:50%;margin:0 auto 20px;
    background:radial-gradient(circle at 32% 30%,#dcd0ff,var(--accent) 55%,#3b2b8a);box-shadow:0 0 40px var(--glow)}
  .welcome h1{font-size:25px;font-weight:600;margin:0 0 10px}
  .welcome p{color:var(--dim);font-size:15px;margin:0 auto;max-width:460px;line-height:1.6}
  .caps{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px}
  .cap{font-size:12px;color:var(--dim);border:1px solid var(--edge);border-radius:999px;padding:5px 12px}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:22px;text-align:left}
  .card{background:var(--panel);border:1px solid var(--edge);border-radius:13px;padding:14px 15px;cursor:pointer;transition:.15s}
  .card:hover{border-color:var(--edge2);transform:translateY(-2px);background:var(--panel2)}
  .card .k{font-size:14px;font-weight:600;margin-bottom:3px}.card .d{font-size:12.5px;color:var(--dim)}

  .composer-wrap{padding:12px 20px 18px;background:linear-gradient(180deg,transparent,var(--bg0) 40%)}
  .composer{max-width:780px;margin:0 auto;background:var(--panel);border:1px solid var(--edge2);border-radius:20px;
    padding:8px 8px 8px 8px;backdrop-filter:blur(14px);box-shadow:0 8px 40px rgba(0,0,0,.4)}
  .composer.drag{border-color:var(--accent);background:var(--panel2)}
  .previews{display:flex;flex-wrap:wrap;gap:8px;padding:6px 6px 2px}
  .previews:empty{display:none}
  .thumb{position:relative;width:56px;height:56px;border-radius:10px;overflow:hidden;border:1px solid var(--edge2)}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .thumb .x{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.6);
    color:#fff;border:none;font-size:12px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center}
  .crow{display:flex;gap:6px;align-items:flex-end;padding:2px}
  .iconbtn{width:38px;height:38px;flex:none;border:none;border-radius:11px;cursor:pointer;background:transparent;
    color:var(--dim);font-size:18px;display:flex;align-items:center;justify-content:center}
  .iconbtn:hover{background:rgba(255,255,255,.07);color:var(--ink)}
  .iconbtn.rec{background:var(--rec);color:#fff;animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,90,122,.5)}50%{box-shadow:0 0 0 8px rgba(255,90,122,0)}}
  textarea{flex:1;resize:none;background:none;color:var(--ink);border:none;outline:none;font-family:var(--sans);
    font-size:15.5px;line-height:1.45;max-height:180px;padding:9px 4px}
  textarea::placeholder{color:var(--faint)}
  .send{width:38px;height:38px;flex:none;border:none;border-radius:11px;cursor:pointer;
    background:linear-gradient(135deg,var(--user1),var(--user2));color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center}
  .send:disabled{opacity:.35;cursor:not-allowed}.send.stop{background:#3a2030;color:#ff8fa3}
  .disclaimer{max-width:780px;margin:8px auto 0;text-align:center;font-size:11px;color:var(--faint)}
  .backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:5}
  @media(max-width:760px){
    .sidebar{position:fixed;z-index:6;height:100%;margin-left:calc(-1 * var(--sb) - 2px)}
    .sidebar.open{margin-left:0}.backdrop.show{display:block}.hamb{display:block}.cards{grid-template-columns:1fr}
  }
  ::-webkit-scrollbar{width:9px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:9px}

  .livebtn{background:linear-gradient(135deg,var(--user1),var(--user2));color:#fff;border:none;
    padding:5px 13px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
  .livebtn:hover{filter:brightness(1.08)}
  .live{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px;
    background:radial-gradient(circle at 50% 38%, rgba(34,22,78,.72), rgba(4,5,12,.97));backdrop-filter:blur(8px)}
  .live.show{display:flex}
  .live-orb{width:150px;height:150px;border-radius:50%;transition:background .35s ease;will-change:transform;
    background:radial-gradient(circle at 35% 30%,#cbb8ff,var(--accent) 55%,#3b2b8a)}
  .live-orb.listening{background:radial-gradient(circle at 35% 30%,#bff6ff,var(--accent2) 55%,#155e73)}
  .live-orb.thinking{background:radial-gradient(circle at 35% 30%,#e6dcff,var(--accent) 55%,#3b2b8a)}
  .live-orb.speaking{background:radial-gradient(circle at 35% 30%,#c9ffe6,#37e0a0 55%,#0f5a44)}
  .live-status{font-size:17px;color:var(--ink);letter-spacing:.3px;font-weight:500}
  .live-cap{max-width:640px;width:100%;text-align:center;padding:0 26px;min-height:70px}
  .live-you{color:var(--accent2);font-size:14px;margin-bottom:9px;opacity:.9}
  .live-reply{color:var(--ink);font-size:16px;line-height:1.55;max-height:32vh;overflow-y:auto}
  .live-x{position:absolute;top:20px;right:24px;background:none;border:none;color:var(--dim);font-size:24px;cursor:pointer}
  .live-end{background:var(--rec);color:#fff;border:none;padding:11px 28px;border-radius:999px;font-size:15px;font-weight:600;cursor:pointer}
  .live-hint{position:absolute;bottom:26px;color:var(--faint);font-size:12px;text-align:center;padding:0 20px}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sb-top">
      <div class="brand"><span class="orb"></span>
        <div><b>Qwen&nbsp;Chat</b><br><span>local · sees · speaks · listens</span></div></div>
      <button class="newchat" id="newchat">＋ New chat</button>
    </div>
    <div class="sb-list" id="sblist"></div>
    <div class="sb-foot"><span class="dot"></span><span id="footmodel">running on your Mac</span></div>
  </aside>
  <div class="backdrop" id="backdrop"></div>

  <div class="live" id="liveOverlay">
    <button class="live-x" id="liveX" title="Close">✕</button>
    <div class="live-orb listening" id="liveOrb"></div>
    <div class="live-status" id="liveStatus">Listening…</div>
    <div class="live-cap"><div class="live-you" id="liveYou"></div><div class="live-reply" id="liveReply"></div></div>
    <button class="live-end" id="liveEnd">End conversation</button>
    <div class="live-hint">Just start talking — pause when you're done and it'll reply. Talk over it to interrupt.</div>
  </div>

  <main class="main">
    <div class="topbar">
      <button class="hamb" id="hamb">☰</button>
      <span class="ttl" id="ttl">New chat</span>
      <select class="modelsel" id="modelSel" title="Pick any model you've installed"></select>
      <span class="spacer"></span>
      <button class="livebtn" id="liveBtn" title="Hands-free voice conversation">🎧 Live</button>
      <label class="toggle" title="Read replies aloud automatically"><input type="checkbox" id="autospeak"> 🔊 auto-speak</label>
      <span class="badge" title="No data leaves your machine">🔒 local</span>
    </div>

    <div id="feed"></div>

    <div class="composer-wrap">
      <div class="composer" id="composer">
        <div class="previews" id="previews"></div>
        <div class="crow">
          <button class="iconbtn" id="attach" title="Attach an image">📎</button>
          <input type="file" id="file" accept="image/*" multiple hidden>
          <textarea id="input" rows="1" placeholder="Ask anything, attach a photo, or tap the mic…"></textarea>
          <button class="iconbtn" id="mic" title="Speak (local Whisper)">🎙️</button>
          <button class="send" id="send" title="Send">↑</button>
        </div>
      </div>
      <div class="disclaimer" id="disclaimer">Runs entirely on your device. It can make mistakes — double-check important info.</div>
    </div>
  </main>
</div>

<script>
const $ = s => document.querySelector(s);
const feed=$("#feed"), input=$("#input"), send=$("#send"), sblist=$("#sblist");
const previews=$("#previews"), composer=$("#composer");
const KEY="qwen_chats_v2";
let chats=load(), currentId=null, controller=null, pending=[], caps={voice_input:false};
let speakingBtn=null, selectedModel="";

const EXAMPLES=[
  {k:"👁️ See an image",d:"Attach a photo and ask about it",p:""},
  {k:"💻 Write code",d:"A Python prime-checker",p:"Write a well-commented Python function that checks if a number is prime."},
  {k:"🧠 Explain",d:"Quantum entanglement, simply",p:"Explain quantum entanglement like I'm 12, in a short paragraph."},
  {k:"🎨 Create",d:"A haiku about the cosmos",p:"Write a beautiful haiku about stars and deep space."},
];

/* ---------- persistence ---------- */
function load(){ try{return JSON.parse(localStorage.getItem(KEY))||[];}catch{return[];} }
function save(){ localStorage.setItem(KEY, JSON.stringify(chats)); }
function current(){ return chats.find(c=>c.id===currentId); }
function newChat(){ currentId=null; pending=[]; renderPreviews(); renderSidebar(); renderThread(); input.focus(); closeSb(); }
function ensureChat(first){ if(current())return current();
  const c={id:Date.now()+"-"+Math.floor(Math.random()*1e4),title:first.slice(0,42)+(first.length>42?"…":""),messages:[],updated:Date.now()};
  chats.unshift(c); currentId=c.id; return c; }
function switchChat(id){ currentId=id; renderSidebar(); renderThread(); closeSb(); }
function deleteChat(id,e){ e.stopPropagation(); chats=chats.filter(c=>c.id!==id); if(currentId===id)currentId=null; save(); renderSidebar(); renderThread(); }

/* ---------- sidebar ---------- */
function renderSidebar(){
  sblist.innerHTML="";
  if(!chats.length){ sblist.innerHTML='<div class="sb-cat">No conversations yet</div>'; return; }
  sblist.insertAdjacentHTML("beforeend",'<div class="sb-cat">Recent</div>');
  chats.forEach(c=>{
    const d=document.createElement("div"); d.className="chatitem"+(c.id===currentId?" active":"");
    d.innerHTML=`<span>💬</span><span class="tt"></span><button class="del" title="Delete">🗑</button>`;
    d.querySelector(".tt").textContent=c.title;
    d.onclick=()=>switchChat(c.id); d.querySelector(".del").onclick=e=>deleteChat(c.id,e);
    sblist.appendChild(d);
  });
}

/* ---------- thread ---------- */
function renderThread(){
  const c=current(); $("#ttl").textContent=c?c.title:"New chat"; feed.innerHTML="";
  if(!c||!c.messages.length){ renderWelcome(); return; }
  const t=document.createElement("div"); t.className="thread"; feed.appendChild(t);
  c.messages.forEach(m=>addRow(m.role,m.content,t,m.imgUrls));
  feed.scrollTop=feed.scrollHeight;
}
function renderWelcome(){
  const w=document.createElement("div"); w.className="welcome";
  w.innerHTML=`<div class="big"></div><h1>How can I help you today?</h1>
    <p>A multimodal AI running privately on your own device. It can read, <b>see images</b>, <b>speak</b>, and <b>listen</b> — all 100% offline.</p>
    <div class="caps" id="capsrow"></div><div class="cards"></div>`;
  const cards=w.querySelector(".cards");
  EXAMPLES.forEach(ex=>{ const el=document.createElement("div"); el.className="card";
    el.innerHTML=`<div class="k">${ex.k}</div><div class="d">${ex.d}</div>`;
    el.onclick=()=>{ if(ex.p){input.value=ex.p; sendMsg();} else $("#attach").click(); };
    cards.appendChild(el); });
  feed.appendChild(w);
  const cr=w.querySelector("#capsrow");
  cr.innerHTML=`<span class="cap">👁️ Vision</span><span class="cap">🔊 Talk-back</span>`+
    (caps.voice_input?`<span class="cap">🎙️ Voice input</span>`:`<span class="cap" style="opacity:.5">🎙️ Voice input (install Whisper)</span>`);
}
function addRow(role,text,thread,imgUrls){
  const row=document.createElement("div"); row.className="row "+(role==="user"?"user":"bot");
  row.innerHTML=`<div class="av">${role==="user"?"You":"Q"}</div>
    <div class="body"><div class="name">${role==="user"?"You":"Qwen"}</div>
    ${imgUrls&&imgUrls.length?`<div class="msg-imgs">${imgUrls.map(u=>`<img src="${u}">`).join("")}</div>`:""}
    <div class="bubble"></div></div>`;
  row.querySelector(".bubble").innerHTML=render(text);
  thread.appendChild(row);
  return row.querySelector(".bubble");
}

/* ---------- images ---------- */
function addFiles(files){
  [...files].filter(f=>f.type.startsWith("image/")).forEach(f=>{
    const r=new FileReader();
    r.onload=()=>{ const url=r.result; pending.push({url, b64:url.split(",")[1]}); renderPreviews(); };
    r.readAsDataURL(f);
  });
}
function renderPreviews(){
  previews.innerHTML="";
  pending.forEach((p,i)=>{ const d=document.createElement("div"); d.className="thumb";
    d.innerHTML=`<img src="${p.url}"><button class="x">✕</button>`;
    d.querySelector(".x").onclick=()=>{ pending.splice(i,1); renderPreviews(); };
    previews.appendChild(d); });
}
$("#attach").onclick=()=>$("#file").click();
$("#file").onchange=e=>{ addFiles(e.target.files); e.target.value=""; };
input.addEventListener("paste",e=>{ const items=[...(e.clipboardData?.items||[])].filter(i=>i.type.startsWith("image/"));
  if(items.length){ addFiles(items.map(i=>i.getAsFile())); } });
["dragover","dragenter"].forEach(ev=>composer.addEventListener(ev,e=>{e.preventDefault();composer.classList.add("drag");}));
["dragleave","drop"].forEach(ev=>composer.addEventListener(ev,e=>{e.preventDefault();composer.classList.remove("drag");}));
composer.addEventListener("drop",e=>{ if(e.dataTransfer?.files) addFiles(e.dataTransfer.files); });

/* ---------- send + stream ---------- */
async function sendMsg(){
  const text=input.value.trim();
  if((!text && !pending.length) || controller) return;
  input.value=""; input.style.height="auto";
  const imgs=pending.map(p=>p.b64), imgUrls=pending.map(p=>p.url); pending=[]; renderPreviews();

  const c=ensureChat(text||"Image");
  const um={role:"user",content:text||"What's in this image?"};
  if(imgs.length){ um.images=imgs; um.imgUrls=imgUrls; }
  c.messages.push(um); c.updated=Date.now(); save(); renderSidebar();

  let t=feed.querySelector(".thread");
  if(!t){ feed.innerHTML=""; t=document.createElement("div"); t.className="thread"; feed.appendChild(t); }
  addRow("user",um.content,t,imgUrls);
  const bubble=addRow("assistant","",t); bubble.innerHTML='<span class="cursor"></span>';
  feed.scrollTop=feed.scrollHeight;

  setGen(true); let full="";
  controller=new AbortController();
  try{
    const out=c.messages.map(m=>({role:m.role,content:m.content,...(m.images?{images:m.images}:{})}));
    const res=await fetch("/chat",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages:out, model:selectedModel}),signal:controller.signal});
    const used=res.headers.get("X-Model"); if(used) $("#footmodel").textContent=used+" · on your device";
    const reader=res.body.getReader(), dec=new TextDecoder(); let buf="",stats=null,stick=true;
    feed.onscroll=()=>{ stick=feed.scrollTop+feed.clientHeight>=feed.scrollHeight-40; };
    while(true){ const {done,value}=await reader.read(); if(done)break;
      buf+=dec.decode(value,{stream:true}); let nl;
      while((nl=buf.indexOf("\n"))>=0){ const line=buf.slice(0,nl).trim(); buf=buf.slice(nl+1); if(!line)continue;
        const o=JSON.parse(line);
        if(o.message?.content){ full+=o.message.content; bubble.innerHTML=render(full)+'<span class="cursor"></span>'; if(stick)feed.scrollTop=feed.scrollHeight; }
        if(o.done)stats=o;
      } }
    bubble.innerHTML=render(full);
    addTools(bubble, full, stats);
    c.messages.push({role:"assistant",content:full}); save();
    if($("#autospeak").checked) speak(full, null);
  }catch(e){
    if(e.name==="AbortError"){ bubble.innerHTML=render(full||"_(stopped)_"); if(full)c.messages.push({role:"assistant",content:full}); save(); }
    else bubble.innerHTML=render("⚠ Couldn't reach the model.\n\nMake sure Ollama is running and the server was started (`python3 chat_server.py`).\n\n"+e);
  }finally{ controller=null; setGen(false); input.focus(); }
}
function setGen(on){
  if(on){ send.classList.add("stop"); send.textContent="◼"; send.title="Stop"; send.onclick=()=>controller&&controller.abort(); }
  else{ send.classList.remove("stop"); send.textContent="↑"; send.title="Send"; send.onclick=sendMsg; }
}
function addTools(bubble, text, stats){
  const bar=document.createElement("div"); bar.className="msgtools";
  const sp=document.createElement("button"); sp.className="tbtn"; sp.innerHTML="🔊 Speak";
  sp.onclick=()=>speak(text, sp);
  bar.appendChild(sp);
  if(stats&&stats.eval_count){ const s=document.createElement("span"); s.className="stat";
    s.textContent=`${stats.eval_count} tok · ${(stats.eval_count/(stats.eval_duration/1e9)).toFixed(1)} tok/s`;
    bar.appendChild(s); }
  bubble.after(bar);
}

/* ---------- voice output (local system voices) ---------- */
function speak(text, btn){
  const ss=window.speechSynthesis; if(!ss) return;
  if(ss.speaking){ ss.cancel(); if(speakingBtn){speakingBtn.classList.remove("on");speakingBtn.innerHTML="🔊 Speak";} if(speakingBtn===btn){speakingBtn=null; return;} }
  const clean=text.replace(/```[\s\S]*?```/g," (code block) ").replace(/[`*#>_]/g,"");
  const u=new SpeechSynthesisUtterance(clean); u.rate=1.02; u.pitch=1;
  u.onend=()=>{ if(btn){btn.classList.remove("on");btn.innerHTML="🔊 Speak";} speakingBtn=null; };
  if(btn){ btn.classList.add("on"); btn.innerHTML="⏹ Stop"; speakingBtn=btn; }
  ss.speak(u);
}

/* ---------- voice input (local Whisper) ---------- */
let recorder=null, chunks=[];
$("#mic").onclick=async()=>{
  if(!caps.voice_input){ alert("Voice input needs local Whisper.\n\nInstall it, then run the server with the venv:\n  pip install faster-whisper\n  .venv/bin/python chat_server.py"); return; }
  if(recorder&&recorder.state==="recording"){ recorder.stop(); return; }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    recorder=new MediaRecorder(stream); chunks=[];
    recorder.ondataavailable=e=>chunks.push(e.data);
    recorder.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop()); $("#mic").classList.remove("rec"); $("#mic").textContent="🎙️";
      const blob=new Blob(chunks,{type:"audio/webm"});
      const old=input.value; input.value=old?old+" …transcribing":"…transcribing";
      try{ const r=await fetch("/transcribe",{method:"POST",headers:{"Content-Type":"application/octet-stream"},body:blob});
        const d=await r.json(); input.value=(old?old+" ":"")+(d.text||""); input.dispatchEvent(new Event("input")); input.focus(); }
      catch(e){ input.value=old; alert("Transcription failed: "+e); }
    };
    recorder.start(); $("#mic").classList.add("rec"); $("#mic").textContent="⏹";
  }catch(e){ alert("Mic access denied or unavailable: "+e); }
};

/* ---------- markdown ---------- */
function render(t){
  let h=t.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  h=h.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>`<pre><button class="copy">copy</button><code>${c.replace(/\n$/,"")}</code></pre>`);
  h=h.replace(/`([^`]+)`/g,"<code>$1</code>").replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/^\s*[-*] (.+)$/gm,"• $1");
  h=h.split(/\n{2,}/).map(p=>p.includes("<pre>")?p:"<p>"+p.replace(/\n/g,"<br>")+"</p>").join("");
  return h;
}

/* ---------- shared streaming helper ---------- */
async function streamChat(outMessages, onToken, signal){
  const res=await fetch("/chat",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({messages:outMessages, model:selectedModel}),signal});
  const model=res.headers.get("X-Model")||"Qwen";
  const reader=res.body.getReader(), dec=new TextDecoder(); let buf="",full="",stats=null;
  while(true){ const {done,value}=await reader.read(); if(done)break;
    buf+=dec.decode(value,{stream:true}); let nl;
    while((nl=buf.indexOf("\n"))>=0){ const line=buf.slice(0,nl).trim(); buf=buf.slice(nl+1); if(!line)continue;
      const o=JSON.parse(line);
      if(o.message?.content){ full+=o.message.content; onToken&&onToken(o.message.content, full); }
      if(o.done)stats=o;
    } }
  return {full,stats,model};
}

/* ---------- Gemini-style live voice ---------- */
const Live={
  active:false, state:"idle", stream:null, ac:null, analyser:null, data:null,
  recorder:null, chunks:[], sentenceBuf:"", controller:null,
  speechStarted:false, silenceStart:0, speakStart:0,

  async start(){
    if(!caps.voice_input){ alert("Live voice needs local Whisper.\n\nInstall it, then run the server with the venv:\n  pip install faster-whisper\n  .venv/bin/python chat_server.py"); return; }
    try{ this.stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}}); }
    catch(e){ alert("Mic access needed for Live: "+e); return; }
    this.active=true; $("#liveOverlay").classList.add("show");
    $("#liveYou").textContent=""; $("#liveReply").textContent="";
    this.ac=new (window.AudioContext||window.webkitAudioContext)();
    const src=this.ac.createMediaStreamSource(this.stream);
    this.analyser=this.ac.createAnalyser(); this.analyser.fftSize=1024;
    this.data=new Uint8Array(this.analyser.fftSize); src.connect(this.analyser);
    this.animate(); this.listen();
  },
  end(){
    this.active=false; $("#liveOverlay").classList.remove("show");
    window.speechSynthesis.cancel();
    if(this.controller){ try{this.controller.abort();}catch{} }
    if(this.recorder&&this.recorder.state==="recording"){ try{this.recorder.stop();}catch{} }
    if(this.stream) this.stream.getTracks().forEach(t=>t.stop());
    if(this.ac){ try{this.ac.close();}catch{} }
    renderThread();
  },
  level(){ this.analyser.getByteTimeDomainData(this.data); let s=0;
    for(let i=0;i<this.data.length;i++){ const v=(this.data[i]-128)/128; s+=v*v; }
    return Math.sqrt(s/this.data.length); },
  setState(s,label){ this.state=s; $("#liveStatus").textContent=label; $("#liveOrb").className="live-orb "+s; },
  animate(){
    if(!this.active) return;
    const l=this.level(), orb=$("#liveOrb"); let scale=1,glow=24;
    if(this.state==="listening"){ scale=1+Math.min(l*3,.6); glow=24+l*150; }
    else if(this.state==="speaking"){ scale=1.1+.13*Math.sin(performance.now()/110); glow=70; }
    else if(this.state==="thinking"){ scale=1+.05*Math.sin(performance.now()/220); glow=34; }
    orb.style.transform=`scale(${scale.toFixed(3)})`; orb.style.boxShadow=`0 0 ${glow.toFixed(0)}px var(--glow)`;
    if(this.state==="speaking" && performance.now()-this.speakStart>700 && l>0.17) this.bargeIn();
    requestAnimationFrame(()=>this.animate());
  },
  listen(){
    if(!this.active) return;
    this.setState("listening","Listening…");
    this.chunks=[]; this.speechStarted=false; this.silenceStart=0;
    try{ this.recorder=new MediaRecorder(this.stream,{mimeType:"audio/webm"}); }
    catch{ this.recorder=new MediaRecorder(this.stream); }
    this.recorder.ondataavailable=e=>{ if(e.data&&e.data.size) this.chunks.push(e.data); };
    this.recorder.onstop=()=>this.onUtterance();
    this.recorder.start(200);
    this.vad();
  },
  vad(){
    if(!this.active||this.state!=="listening") return;
    const l=this.level(), now=performance.now(), SPEAK=.05, SILENCE=850;
    if(l>SPEAK){ this.speechStarted=true; this.silenceStart=0; }
    else if(this.speechStarted){ if(!this.silenceStart) this.silenceStart=now;
      if(now-this.silenceStart>SILENCE){ if(this.recorder.state==="recording") this.recorder.stop(); return; } }
    setTimeout(()=>this.vad(),90);
  },
  async onUtterance(){
    if(!this.active) return;
    if(!this.speechStarted||!this.chunks.length){ this.listen(); return; }
    this.setState("thinking","Thinking…");
    const blob=new Blob(this.chunks,{type:"audio/webm"});
    let text="";
    try{ const r=await fetch("/transcribe",{method:"POST",headers:{"Content-Type":"application/octet-stream"},body:blob}); text=((await r.json()).text||"").trim(); }
    catch{ this.listen(); return; }
    if(!text){ this.listen(); return; }
    $("#liveYou").textContent="“"+text+"”"; $("#liveReply").textContent="";
    const c=ensureChat(text); c.messages.push({role:"user",content:text}); c.updated=Date.now(); save(); renderSidebar();
    this.setState("speaking","Speaking…"); this.speakStart=performance.now(); this.sentenceBuf="";
    this.controller=new AbortController();
    try{
      const out=c.messages.map(m=>({role:m.role,content:m.content,...(m.images?{images:m.images}:{})}));
      const {full}=await streamChat(out,(tok,fullSoFar)=>{
        $("#liveReply").textContent=fullSoFar; this.sentenceBuf+=tok; this.drain(false);
      }, this.controller.signal);
      this.drain(true);
      c.messages.push({role:"assistant",content:full}); save();
      this.waitThenListen();
    }catch(e){ if(this.active && e.name!=="AbortError") this.listen(); }
  },
  drain(force){
    while(true){
      const m=this.sentenceBuf.match(/^([\s\S]*?[.!?…])(\s|$)/);
      if(m){ this.sentenceBuf=this.sentenceBuf.slice(m[0].length); this.say(m[1]); }
      else if(force && this.sentenceBuf.trim()){ this.say(this.sentenceBuf); this.sentenceBuf=""; break; }
      else break;
    }
  },
  say(sentence){
    const clean=sentence.replace(/```[\s\S]*?```/g," code block ").replace(/[`*#>_~]/g,"").trim();
    if(!clean) return;
    const u=new SpeechSynthesisUtterance(clean); u.rate=1.04;
    window.speechSynthesis.speak(u);
  },
  bargeIn(){
    window.speechSynthesis.cancel();
    if(this.controller){ try{this.controller.abort();}catch{} }
    this.listen();
  },
  waitThenListen(){
    if(!this.active) return;
    if(window.speechSynthesis.speaking||window.speechSynthesis.pending){ setTimeout(()=>this.waitThenListen(),200); return; }
    this.listen();
  },
};
$("#liveBtn").onclick=()=>Live.start();
$("#liveX").onclick=()=>Live.end();
$("#liveEnd").onclick=()=>Live.end();

/* ---------- starfield ---------- */
const sc=$("#stars"), sx=sc.getContext("2d"); let stars=[],shooting=null,tt=0;
function resize(){ sc.width=innerWidth; sc.height=innerHeight;
  const n=Math.min(240,Math.floor(innerWidth*innerHeight/7000));
  stars=Array.from({length:n},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,z:Math.random(),r:Math.random()*1.3+.2,tw:Math.random()*6.28,sp:Math.random()*.9+.15})); }
resize(); addEventListener("resize",resize);
function sky(){ tt+=.016; sx.clearRect(0,0,sc.width,sc.height);
  for(const s of stars){ s.y+=s.sp*(.15+s.z*.35); if(s.y>sc.height){s.y=0;s.x=Math.random()*sc.width;}
    const a=.35+.65*Math.abs(Math.sin(s.tw+tt*(.6+s.z))); sx.globalAlpha=a*(.4+s.z*.6);
    sx.fillStyle=s.z>.85?"#cbd9ff":"#eaf0ff"; sx.beginPath(); sx.arc(s.x,s.y,s.r*(.6+s.z),0,7); sx.fill(); }
  if(!shooting&&Math.random()<.004) shooting={x:Math.random()*sc.width*.7,y:Math.random()*sc.height*.4,life:0,vx:5+Math.random()*4,vy:2+Math.random()*2};
  if(shooting){ const s=shooting; s.life++;
    const g=sx.createLinearGradient(s.x,s.y,s.x-s.vx*9,s.y-s.vy*9); g.addColorStop(0,"rgba(180,200,255,.9)"); g.addColorStop(1,"rgba(180,200,255,0)");
    sx.globalAlpha=1; sx.strokeStyle=g; sx.lineWidth=2; sx.beginPath(); sx.moveTo(s.x,s.y); sx.lineTo(s.x-s.vx*9,s.y-s.vy*9); sx.stroke();
    s.x+=s.vx; s.y+=s.vy; if(s.life>60||s.x>sc.width||s.y>sc.height)shooting=null; }
  requestAnimationFrame(sky); }
sky();
</script>
